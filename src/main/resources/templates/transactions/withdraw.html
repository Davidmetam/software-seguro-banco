<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Retirar')}"></head>
<body class="min-h-screen bg-slate-50 text-slate-800">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
    <div class="mb-8">
        <p class="text-sm font-medium text-amber-700">Retiro</p>
        <h1 class="text-2xl font-bold tracking-tight text-slate-900 md:text-3xl">Retirar dinero</h1>
        <p class="mt-2 text-sm text-slate-500">Retira solo montos disponibles en tu cuenta.</p>
    </div>

    <div class="grid gap-6 lg:grid-cols-[1fr_420px]">
        <section class="space-y-6">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <p class="text-sm font-medium text-slate-500">Saldo actual</p>
                <p class="mt-3 text-3xl font-bold tracking-tight text-slate-900">$<span th:text="${#numbers.formatDecimal(account.balance, 1, 'COMMA', 2, 'POINT')}">0.00</span></p>
                <p class="mt-2 text-sm text-slate-500">Cuenta de @<span th:text="${account.user.username}">usuario</span></p>
            </div>

            <div class="rounded-2xl border border-amber-100 bg-amber-50 p-4 text-sm text-amber-800">
                Puedes retirar hasta el saldo disponible de tu cuenta.
            </div>
        </section>

        <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-slate-800">Datos del retiro</h2>
            <form th:action="@{/withdraw}" th:object="${withdrawRequest}" method="post" class="mt-6 space-y-5">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div>
                    <label for="amount" class="block text-sm font-medium text-slate-700">Monto</label>
                    <div class="mt-2 flex rounded-xl border border-slate-300 bg-white shadow-sm transition focus-within:border-amber-600 focus-within:ring-4 focus-within:ring-amber-100">
                        <span class="flex items-center border-r border-slate-200 px-4 text-sm font-semibold text-slate-500">$</span>
                        <input id="amount" th:field="*{amount}" type="number" min="0.01" step="0.01" required class="block w-full rounded-r-xl border-0 bg-transparent px-4 py-3 text-sm text-slate-900 outline-none">
                    </div>
                    <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></p>
                </div>

                <button type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-amber-600 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-amber-700 focus:outline-none focus:ring-4 focus:ring-amber-100">Retirar</button>
            </form>
        </section>
    </div>
</main>
</body>
</html>
