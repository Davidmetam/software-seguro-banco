<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 text-slate-800">
<main class="flex min-h-screen items-center justify-center px-4 py-12">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/95 p-8 text-center shadow-2xl shadow-blue-950/30 backdrop-blur">
        <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-red-50 text-lg font-bold text-red-700 ring-1 ring-red-200">!</div>
        <h1 class="mt-6 text-2xl font-bold tracking-tight text-slate-900">No se pudo completar la operacion</h1>
        <p class="mt-3 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-800" th:text="${errorMessage ?: 'Ocurrio un error inesperado.'}">Error</p>
        <a th:href="@{/dashboard}" class="mt-6 inline-flex w-full items-center justify-center rounded-xl bg-blue-700 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-100">Volver al dashboard</a>
    </section>
</main>
</body>
</html>
