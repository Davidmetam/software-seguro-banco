<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Banca del Bienestar'">Banca del Bienestar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bank: {
                            navy: '#0F172A',
                            blue: '#1E3A8A',
                            soft: '#2563EB',
                            teal: '#0F766E'
                        }
                    },
                    boxShadow: {
                        soft: '0 20px 45px -25px rgb(15 23 42 / 0.35)'
                    }
                }
            }
        }
    </script>
</head>
<body>
<nav th:fragment="navbar" class="border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
        <a th:href="@{/dashboard}" class="flex items-center gap-3 text-lg font-bold text-slate-900">
            <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-700 text-sm font-bold text-white shadow-sm">BB</span>
            <span>Banca del Bienestar</span>
        </a>

        <div class="flex flex-wrap items-center gap-2">
            <a th:href="@{/dashboard}" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 hover:text-slate-900">Dashboard</a>
            <a th:href="@{/deposit}" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 hover:text-slate-900">Depositar</a>
            <a th:href="@{/withdraw}" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 hover:text-slate-900">Retirar</a>
            <a th:href="@{/transfer}" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 hover:text-slate-900">Transferir</a>
            <a th:href="@{/movements}" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 hover:text-slate-900">Movimientos</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-red-50 hover:text-red-700">Salir</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
