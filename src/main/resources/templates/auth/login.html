<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Iniciar sesion')}"></head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 text-slate-800">
<main class="flex min-h-screen items-center justify-center px-4 py-12">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/95 p-8 shadow-2xl shadow-blue-950/30 backdrop-blur">
        <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-700 text-lg font-bold text-white shadow-lg shadow-blue-900/30">BB</div>
        <h1 class="mt-6 text-center text-2xl font-bold tracking-tight text-slate-900">Iniciar sesion</h1>
        <p class="mt-2 text-center text-sm text-slate-500">Ingresa a tu cuenta de Banca del Bienestar.</p>

        <div th:if="${successMessage}" class="mt-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-800" th:text="${successMessage}"></div>
        <div th:if="${param.error}" class="mt-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-800">Usuario o PIN incorrecto.</div>
        <div th:if="${param.logout}" class="mt-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-800">Has salido correctamente.</div>

        <form th:action="@{/login}" method="post" class="mt-8 space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div>
                <label for="username" class="block text-sm font-medium text-slate-700">Usuario</label>
                <input id="username" name="username" type="text" autocomplete="username" required class="mt-2 block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
            </div>

            <div>
                <label for="pin" class="block text-sm font-medium text-slate-700">PIN</label>
                <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required class="mt-2 block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
            </div>

            <button type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-blue-700 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-100">Entrar</button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">¿No tienes cuenta? <a th:href="@{/register}" class="font-semibold text-blue-700 hover:text-blue-800">Registrate</a></p>
    </section>
</main>
</body>
</html>
