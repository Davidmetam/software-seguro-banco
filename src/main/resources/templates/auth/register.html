<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registro')}"></head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 text-slate-800">
<main class="flex min-h-screen items-center justify-center px-4 py-12">
    <section class="w-full max-w-lg rounded-3xl border border-white/10 bg-white/95 p-8 shadow-2xl shadow-blue-950/30 backdrop-blur">
        <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-700 text-lg font-bold text-white shadow-lg shadow-blue-900/30">BB</div>
        <h1 class="mt-6 text-center text-2xl font-bold tracking-tight text-slate-900">Crear cuenta</h1>
        <p class="mt-2 text-center text-sm text-slate-500">Registra tus datos para comenzar a operar con Banca del Bienestar.</p>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="mt-8 space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div>
                <label for="name" class="block text-sm font-medium text-slate-700">Nombre</label>
                <input id="name" th:field="*{name}" type="text" autocomplete="name" required class="mt-2 block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
                <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-slate-700">Usuario</label>
                <input id="username" th:field="*{username}" type="text" autocomplete="username" required class="mt-2 block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
                <p class="mt-1 text-xs text-slate-500">Usa letras, numeros, puntos, guiones o guion bajo.</p>
                <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
            </div>

            <div>
                <label for="pin" class="block text-sm font-medium text-slate-700">PIN</label>
                <input id="pin" th:field="*{pin}" type="password" inputmode="numeric" autocomplete="new-password" required class="mt-2 block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
                <p class="mt-1 text-xs text-slate-500">Debe contener entre 4 y 8 digitos.</p>
                <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('pin')}" th:errors="*{pin}"></p>
            </div>

            <button type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-blue-700 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-100">Crear cuenta</button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">¿Ya tienes cuenta? <a th:href="@{/login}" class="font-semibold text-blue-700 hover:text-blue-800">Inicia sesion</a></p>
    </section>
</main>
</body>
</html>
